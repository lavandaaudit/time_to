<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Лічильник їблування</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
}

body{
    background:#000;
    overflow:hidden;
    color:#fff;

    position:fixed;
    inset:0;

    position:relative;

        font-size:26px;

</head>

<body>

<canvas id="stars"></canvas>

<div class="container">

    <div class="title">
        ЛІЧИЛЬНИК ЇБЛУВАННЯ
    </div>

    <div class="subtitle">
        ВИ НІХУЯ НЕ РОБИТЕ
    </div>

    <div class="timer" id="idleTimer">
        00:00:00.000
    </div>

    <div class="subtitle">
        НІХУЯ Й НЕ ЗРОБИТЕ
        <br>
        через:
    </div>

    <div class="countdown" id="countdown">
        0 ДНІВ 00:00:00
    </div>

    <div class="footer">
        ibonarium: 19/06/2026
    </div>

</div>

<script>

const idleTimer = document.getElementById("idleTimer");

const startTime = Date.now();

let currentTimerText = "00:00:00.000";

function updateIdleTimer(){

    const elapsed = Date.now() - startTime;

    const hours =
        Math.floor(elapsed / 3600000);

    const minutes =
        Math.floor((elapsed % 3600000) / 60000);

    const seconds =
        Math.floor((elapsed % 60000) / 1000);

    const milliseconds =
        elapsed % 1000;

    currentTimerText =
        String(hours).padStart(2,'0') +
        ":" +
        String(minutes).padStart(2,'0') +
        ":" +
        String(seconds).padStart(2,'0') +
        "." +
        String(milliseconds).padStart(3,'0');

    if(!glitchRunning){
        idleTimer.textContent = currentTimerText;
    }
}

setInterval(updateIdleTimer,10);

const countdown =
    document.getElementById("countdown");

const targetDate =
    new Date("2030-01-01T00:00:00");

function updateCountdown(){

    const now = new Date();

    const diff = targetDate - now;

    if(diff <= 0){

        countdown.textContent =
            "ЧАС ВИЙШОВ";

        return;
    }

    const days =
        Math.floor(diff / (1000*60*60*24));

    const hours =
        Math.floor((diff/(1000*60*60))%24);

    const minutes =
        Math.floor((diff/(1000*60))%60);

    const seconds =
        Math.floor((diff/1000)%60);

    countdown.textContent =
        days +
        " ДНІВ " +
        String(hours).padStart(2,'0') +
        ":" +
        String(minutes).padStart(2,'0') +
        ":" +
        String(seconds).padStart(2,'0');
}

updateCountdown();
setInterval(updateCountdown,1000);

let glitchRunning = false;

function randomChar(){

    const chars =
        "0123456789#$%@&!?X";

    return chars[
        Math.floor(Math.random()*chars.length)
    ];
}

function generateGlitchText(text){

    let result = "";

    for(let i=0;i<text.length;i++){

        if(
            Math.random() < 0.25 &&
            text[i] !== ":" &&
            text[i] !== "."
        ){
            result += randomChar();
        }
        else{
            result += text[i];
        }
    }

    return result;
}

function runGlitch(){

    glitchRunning = true;

    let count = 0;

    const effect = setInterval(()=>{

        idleTimer.textContent =
            generateGlitchText(currentTimerText);

        count++;

        if(count > 6){

            clearInterval(effect);

            idleTimer.textContent =
                currentTimerText;

            glitchRunning = false;
        }

    },60);
}

setInterval(runGlitch,15000);

const canvas =
    document.getElementById("stars");

const ctx =
    canvas.getContext("2d");

let width;
let height;

function resize(){

    width =
        canvas.width =
        window.innerWidth;

    height =
        canvas.height =
        window.innerHeight;
}

resize();

window.addEventListener(
    "resize",
    resize
);

const stars = [];

for(let i=0;i<800;i++){

    stars.push({

        x:(Math.random()-0.5)*width,
        y:(Math.random()-0.5)*height,
        z:Math.random()*width

    });
}

function animate(){

    ctx.fillStyle = "#000";
    ctx.fillRect(
        0,
        0,
        width,
        height
    );

    for(const star of stars){

        star.z -= 0.25;

        if(star.z <= 1){

            star.x =
                (Math.random()-0.5)*width;

            star.y =
                (Math.random()-0.5)*height;

            star.z = width;
        }

        const k = 128 / star.z;

        const px =
            star.x * k + width/2;

        const py =
            star.y * k + height/2;

        if(
            px >= 0 &&
            px < width &&
            py >= 0 &&
            py < height
        ){

            const size =
                (1 - star.z/width) * 2.5;

            ctx.beginPath();

            ctx.arc(
                px,
                py,
                Math.max(0.3,size),
                0,
                Math.PI * 2
            );

            ctx.fillStyle =
                "rgba(255,255,255,.9)";

            ctx.fill();
        }
    }

    requestAnimationFrame(
        animate
    );
}

animate();

</script>

</body>
</html>
