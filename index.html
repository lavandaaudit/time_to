```html
<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Лічильник їблування</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
}

body{
    background:#000;
    overflow:hidden;
    color:white;
    font-family:'Bebas Neue',sans-serif;
}

#stars{
    position:fixed;
    inset:0;
    z-index:0;
}

.container{
    position:relative;
    z-index:2;

    width:100%;
    height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    text-align:center;

    padding:20px;
}

.glitch{
    position:relative;

    text-shadow:
    0 0 8px rgba(255,255,255,.15),
    -1px 0 rgba(255,0,80,.20),
    1px 0 rgba(0,255,255,.20);

    animation:glitch-skew 20s infinite;
}

.glitch::before,
.glitch::after{
    content:attr(data-text);

    position:absolute;
    left:0;
    top:0;

    width:100%;
    overflow:hidden;
}

.glitch::before{
    color:#ff3366;

    transform:translateX(-1px);

    opacity:.25;

    animation:glitch1 18s infinite;
}

.glitch::after{
    color:#00ffff;

    transform:translateX(1px);

    opacity:.25;

    animation:glitch2 22s infinite;
}

@keyframes glitch1{

    0%,90%,100%{
        clip-path:inset(0 0 0 0);
    }

    92%{
        clip-path:inset(15% 0 55% 0);
    }

    94%{
        clip-path:inset(70% 0 10% 0);
    }

    96%{
        clip-path:inset(35% 0 35% 0);
    }
}

@keyframes glitch2{

    0%,88%,100%{
        clip-path:inset(0 0 0 0);
    }

    90%{
        clip-path:inset(60% 0 10% 0);
    }

    94%{
        clip-path:inset(10% 0 70% 0);
    }

    98%{
        clip-path:inset(40% 0 20% 0);
    }
}

@keyframes glitch-skew{

    0%,100%{
        transform:skew(0deg);
    }

    95%{
        transform:skew(.5deg);
    }

    97%{
        transform:skew(-.5deg);
    }
}

.title{
    font-size:clamp(32px,5vw,70px);
    letter-spacing:4px;
    margin-bottom:15px;
}

.subtitle{
    font-size:clamp(22px,2.5vw,34px);
    margin-bottom:10px;
    line-height:1.2;
}

.timer{
    font-size:clamp(42px,8vw,95px);
    margin-bottom:60px;
}

.countdown{
    font-size:clamp(28px,5vw,60px);
}

.footer{

    position:absolute;
    bottom:20px;

    opacity:.25;

    font-size:14px;
    letter-spacing:3px;
}

@media(max-width:768px){

    .title{
        font-size:34px;
    }

    .timer{
        font-size:42px;
        margin-bottom:40px;
    }

    .subtitle{
        font-size:22px;
    }

    .countdown{
        font-size:26px;
        line-height:1.3;
    }
}

</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="container">

    <div
        class="title glitch"
        data-text="ЛІЧИЛЬНИК ЇБЛУВАННЯ">
        ЛІЧИЛЬНИК ЇБЛУВАННЯ
    </div>

    <div
        class="subtitle glitch"
        data-text="ВИ НІХУЯ НЕ РОБИТЕ">
        ВИ НІХУЯ НЕ РОБИТЕ
    </div>

    <div
        class="timer glitch"
        id="idleTimer"
        data-text="00:00:00.000">
        00:00:00.000
    </div>

    <div
        class="subtitle glitch"
        data-text="НІХУЯ Й НЕ ЗРОБИТЕ: ЛІЧИЛЬНИК ДО 2030 РОКУ">
        НІХУЯ Й НЕ ЗРОБИТЕ
        через:
    </div>

    <div class="countdown" id="countdown">
        0 ДНІВ 00:00:00
    </div>

    <div class="footer">
        GITHUB PAGES
    </div>

</div>

<script>

const idleTimer=document.getElementById("idleTimer");

const startTime=Date.now();

function updateIdleTimer(){

    const elapsed=Date.now()-startTime;

    const hours=Math.floor(elapsed/3600000);
    const minutes=Math.floor((elapsed%3600000)/60000);
    const seconds=Math.floor((elapsed%60000)/1000);
    const milliseconds=elapsed%1000;

    idleTimer.textContent=
        String(hours).padStart(2,'0')+
        ":"+
        String(minutes).padStart(2,'0')+
        ":"+
        String(seconds).padStart(2,'0')+
        "."+
        String(milliseconds).padStart(3,'0');
}

setInterval(updateIdleTimer,10);

const countdown=document.getElementById("countdown");

const targetDate=new Date("2030-01-01T00:00:00");

function updateCountdown(){

    const now=new Date();

    const diff=targetDate-now;

    if(diff<=0){

        countdown.textContent="ЧАС ВИЙШОВ";

        return;
    }

    const days=Math.floor(diff/(1000*60*60*24));

    const hours=Math.floor(
        (diff/(1000*60*60))%24
    );

    const minutes=Math.floor(
        (diff/(1000*60))%60
    );

    const seconds=Math.floor(
        (diff/1000)%60
    );

    countdown.textContent=
        days+
        " ДНІВ " +
        String(hours).padStart(2,'0')+
        ":"+
        String(minutes).padStart(2,'0')+
        ":"+
        String(seconds).padStart(2,'0');
}

updateCountdown();

setInterval(updateCountdown,1000);

const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");

let width;
let height;

function resize(){

    width=canvas.width=window.innerWidth;
    height=canvas.height=window.innerHeight;
}

resize();

window.addEventListener("resize",resize);

const stars=[];

for(let i=0;i<800;i++){

    stars.push({

        x:(Math.random()-0.5)*width,
        y:(Math.random()-0.5)*height,
        z:Math.random()*width
    });
}

function animate(){

    ctx.fillStyle="#000";
    ctx.fillRect(0,0,width,height);

    for(const star of stars){

        star.z-=0.25;

        if(star.z<=1){

            star.x=(Math.random()-0.5)*width;
            star.y=(Math.random()-0.5)*height;
            star.z=width;
        }

        const k=128/star.z;

        const px=star.x*k+width/2;
        const py=star.y*k+height/2;

        if(
            px>=0 &&
            px<width &&
            py>=0 &&
            py<height
        ){

            const size=
                (1-star.z/width)*2.5;

            ctx.beginPath();

            ctx.arc(
                px,
                py,
                Math.max(0.3,size),
                0,
                Math.PI*2
            );

            ctx.fillStyle="rgba(255,255,255,.9)";
            ctx.fill();
        }
    }

    requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
